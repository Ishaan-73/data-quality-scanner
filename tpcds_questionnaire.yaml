    freshness_sla_hours: 168
    is_event_time: true
    late_arrival_hours: 48
    must_be_after: null
  - column: i_rec_end_date
    freshness_sla_hours: null
    is_event_time: false
    late_arrival_hours: null
    must_be_after: i_rec_start_date
  foreign_keys: []
  business_rules:
