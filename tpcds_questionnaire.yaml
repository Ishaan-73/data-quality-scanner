_instructions: 'Fill in every field marked ''# TODO''. Leave null/[] where you have
  no information. Then run:  dqs generate-config --questionnaire <this_file> --out
  scan_config.yaml'
meta:
  scan_name: tpcds_wizard_run
  connector:
    dialect: duckdb
    duckdb_path: test/tpcds_dirty.duckdb
tables:
- name: store_sales
  ai_role: training_data
  id_columns:
  - column: ss_sold_date_sk
    is_primary_key: true
  - column: ss_sold_time_sk
    is_primary_key: true
  - column: ss_item_sk
    is_primary_key: true
  - column: ss_customer_sk
    is_primary_key: true
  - column: ss_cdemo_sk
    is_primary_key: true
  - column: ss_hdemo_sk
    is_primary_key: true
  - column: ss_addr_sk
    is_primary_key: true
  - column: ss_store_sk
    is_primary_key: true
  - column: ss_promo_sk
    is_primary_key: true
  monetary_columns:
  - column: ss_wholesale_cost
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_list_price
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_sales_price
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_ext_discount_amt
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_ext_sales_price
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_ext_wholesale_cost
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_ext_list_price
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_ext_tax
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_net_paid
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_net_paid_inc_tax
    must_be_positive: true
    currency_column: null
    valid_currencies: []
  - column: ss_net_profit
    must_be_positive: false
    currency_column: null
    valid_currencies: []
  categorical_columns: []
  numeric_columns:
  - column: ss_ticket_number
    min: 1
    max: null
    must_be_positive: true
  - column: ss_quantity
    min: 1
    max: 100
    must_be_positive: true
  timestamp_columns: []
  foreign_keys:
  - column: ss_item_sk
    references_table: item
    references_column: i_item_sk
  - column: ss_customer_sk
    references_table: customer
    references_column: c_customer_sk
  - column: ss_sold_date_sk
    references_table: date_dim
    references_column: d_date_sk
  business_rules:
  - ss_sales_price <= ss_list_price
  - ss_net_paid >= 0
  conditional_completeness: []
  volume:
    max_daily_change_pct: 20
    prior_table: null
- name: customer
  ai_role: feature_store
  id_columns:
  - column: c_customer_sk
    is_primary_key: true
  - column: c_customer_id
    is_business_key: true
  - column: c_current_cdemo_sk
    is_primary_key: true
  - column: c_current_hdemo_sk
    is_primary_key: true
  - column: c_current_addr_sk
    is_primary_key: true
  - column: c_first_shipto_date_sk
    is_primary_key: true
  - column: c_first_sales_date_sk
    is_primary_key: true
  - column: c_last_review_date_sk
    is_primary_key: true
  monetary_columns: []
  categorical_columns:
  - column: c_salutation
    valid_values:
    - Dr.
    - Sir
    - Mr.
    - Miss
    - Ms.
    - Mrs.
    standardize: false
  - column: c_preferred_cust_flag
    valid_values:
    - N
    - Y
    standardize: false
  - column: c_login
    valid_values:
    - ''
    standardize: false
  numeric_columns:
  - column: c_birth_day
    min: 1
    max: 31
    must_be_positive: true
  - column: c_birth_month
    min: 1
    max: 12
    must_be_positive: true
  - column: c_birth_year
    min: 1920
    max: 2010
    must_be_positive: true
  - column: c_birth_country
    min: null
    max: null
    must_be_positive: false
  timestamp_columns: []
  foreign_keys: []
  business_rules:
  - c_birth_day >= 1
  - c_birth_month >= 1
  conditional_completeness:
  - condition: c_preferred_cust_flag = 'Y'
    column_must_not_be_null: c_email_address
  volume:
    max_daily_change_pct: 10
    prior_table: null
